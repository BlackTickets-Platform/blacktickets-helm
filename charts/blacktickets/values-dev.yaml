namespace: blacktickets-dev
image:
  registry: AWS_ACCOUNT_ID.dkr.ecr.AWS_REGION.amazonaws.com
  tag: dev
  pullPolicy: Always
config:
  awsAccountId: "AWS_ACCOUNT_ID"
  roleNamePrefix: "blacktickets-dev"
  awsRegion: us-east-1
  dbHost: blacktickets-dev-postgres.DATABASE_IDENTIFIER.us-east-1.rds.amazonaws.com
  dbPort: "5432"
  dbUser: postgres
  dbSsl: "true"
  posterBucketName: blacktickets-dev-posters
  posterCdnDomain: CLOUDFRONT_DOMAIN
  eventServiceUrl: http://event-service:4002
  bookingServiceUrl: http://booking-service:4003
  bookingNotificationQueueUrl: ""
secrets:
  name: blacktickets-app-secrets
  create: false
externalSecrets:
  enabled: true
  createSecretStore: true
  secretStoreName: aws-secretsmanager
  secretStoreKind: ClusterSecretStore
  remoteSecretName: blacktickets-dev/app-config
  refreshInterval: 1h
  serviceAccountName: external-secrets
  serviceAccountNamespace: external-secrets
gateway:
  enabled: true
  createClass: true
  className: alb
  hostname: hostname.placeholder
  certificateArn: "ACM_CERTIFICATE_ARN"
  scheme: internet-facing
  annotations: {}
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
service:
  type: NodePort
services:
  frontend:
    tag: dev
    port: 8080
    replicas: 1
    serviceAccount:
      annotations: {}
    env: {}
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      readiness:
        path: /
        initialDelaySeconds: 10
      liveness:
        path: /
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
  identity-service:
    repository: blacktickets-identity-service
    tag: dev-a2115469ea571b6c681367f5906876b5f57f6854
    port: 4001
    replicas: 2
    serviceAccount:
      annotations: {}
    env:
      DB_NAME: blacktickets
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      readiness:
        path: /ready
        initialDelaySeconds: 10
      liveness:
        path: /healthz
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
  event-service:
    repository: blacktickets-event-service
    tag: dev-a2115469ea571b6c681367f5906876b5f57f6854
    port: 4002
    replicas: 1
    serviceAccount:
      roleName: event-service-irsa
    env:
      DB_NAME: blacktickets
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      readiness:
        path: /ready
        initialDelaySeconds: 10
      liveness:
        path: /healthz
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
  booking-service:
    repository: blacktickets-booking-service
    tag: dev-a2115469ea571b6c681367f5906876b5f57f6854
    port: 4003
    replicas: 2
    serviceAccount:
      roleName: booking-service-irsa
    env:
      DB_NAME: blacktickets
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      readiness:
        path: /ready
        initialDelaySeconds: 10
      liveness:
        path: /healthz
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
  chatbot-service:
    repository: blacktickets-chatbot-service
    tag: dev-250fe9e41d128c553258cf543523f4547394dfb4
    port: 4004
    replicas: 1
    serviceAccount:
      roleName: chatbot-service-irsa
    env: {}
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      readiness:
        path: /ready
        initialDelaySeconds: 10
      liveness:
        path: /healthz
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
bedrock:
  enabled: true
  roleArn: ""
  assumeRoleArn: "arn:aws:iam::091869721157:role/BlackticketsBedrockCrossAccountRole"
  region: "us-east-1"
  modelId: "amazon.nova-micro-v1:0"
monitoring:
  serviceMonitors:
    enabled: true
  prometheusRules:
    enabled: false
networkPolicy:
  enabled: true
