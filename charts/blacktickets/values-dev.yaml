namespace: blacktickets-dev

image:
  registry: 091869721157.dkr.ecr.us-east-1.amazonaws.com
  tag: dev
  pullPolicy: Always

config:
  awsRegion: us-east-1
  dbHost: blacktickets-dev-postgres.cqpkso2i290v.us-east-1.rds.amazonaws.com
  dbPort: "5432"
  dbUser: postgres
  dbSsl: "true"
  posterBucketName: blacktickets-dev-posters
  posterCdnDomain: d3me96rgp01al.cloudfront.net
  eventServiceUrl: http://event-service:4002
  bookingServiceUrl: http://booking-service:4003
  bookingNotificationQueueUrl: ""

secrets:
  name: blacktickets-app-secrets
  create: false

externalSecrets:
  enabled: true
  createSecretStore: true
  secretStoreName: aws-secretsmanager
  secretStoreKind: ClusterSecretStore
  remoteSecretName: blacktickets-dev/app-config
  refreshInterval: 1h
  serviceAccountName: external-secrets
  serviceAccountNamespace: external-secrets

gateway:
  enabled: true
  createClass: true
  className: alb
  hostname: ""
  scheme: internet-facing
  annotations: {}

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

service:
  type: NodePort

services:
  frontend:
    repository: blacktickets-frontend
    port: 80
    replicas: 1
    serviceAccount:
      annotations: {}
    env: {}
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      readiness:
        path: /
        initialDelaySeconds: 10
      liveness:
        path: /
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
  identity-service:
    repository: blacktickets-identity-service
    port: 4001
    replicas: 1
    serviceAccount:
      annotations: {}
    env:
      DB_NAME: blacktickets
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      readiness:
        path: /health
        initialDelaySeconds: 10
      liveness:
        path: /health
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
  event-service:
    repository: blacktickets-event-service
    port: 4002
    replicas: 1
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::091869721157:role/blacktickets-dev-event-service-irsa
    env:
      DB_NAME: blacktickets
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      readiness:
        path: /health
        initialDelaySeconds: 10
      liveness:
        path: /health
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
  booking-service:
    repository: blacktickets-booking-service
    port: 4003
    replicas: 1
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::091869721157:role/blacktickets-dev-booking-service-irsa
    env:
      DB_NAME: blacktickets
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      readiness:
        path: /health
        initialDelaySeconds: 10
      liveness:
        path: /health
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
  chatbot-service:
    repository: blacktickets-chatbot-service
    port: 4004
    replicas: 1
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::091869721157:role/blacktickets-dev-chatbot-service-irsa
    env: {}
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      readiness:
        path: /health
        initialDelaySeconds: 10
      liveness:
        path: /health
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
