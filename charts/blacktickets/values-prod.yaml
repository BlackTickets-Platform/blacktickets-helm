namespace: blacktickets-prod
image:
  registry: AWS_ACCOUNT_ID.dkr.ecr.AWS_REGION.amazonaws.com
  tag: prod
  pullPolicy: IfNotPresent
config:
  awsAccountId: "AWS_ACCOUNT_ID"
  roleNamePrefix: "blacktickets-prod"
  awsRegion: us-east-1
  dbHost: blacktickets-prod-postgres.cluster.local
  dbPort: "5432"
  dbUser: postgres
  dbSsl: "true"
  posterBucketName: blacktickets-prod-posters
  posterCdnDomain: ""
  eventServiceUrl: http://event-service:4002
  bookingServiceUrl: http://booking-service:4003
  bookingNotificationQueueUrl: ""
secrets:
  name: blacktickets-secrets
  create: false
externalSecrets:
  enabled: false
  createSecretStore: false
  secretStoreName: aws-secrets-manager
  secretStoreKind: ClusterSecretStore
  remoteSecretName: blacktickets/app-config
  refreshInterval: 1h
  serviceAccountName: external-secrets
  serviceAccountNamespace: external-secrets
gateway:
  enabled: true
  createClass: false
  className: alb
  hostname: blacktickets.ananthapps.site
  certificateArn: ""
  scheme: internet-facing
  annotations: {}
hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
service:
  type: NodePort
services:
  frontend:
    repository: blacktickets-frontend
    tag: v0.0.1
    port: 80
    replicas: 2
    serviceAccount:
      annotations: {}
    env: {}
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
    probes:
      readiness:
        path: /
        initialDelaySeconds: 10
      liveness:
        path: /
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: false
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
  identity-service:
    repository: blacktickets-identity-service
    tag: v0.0.1
    port: 4001
    replicas: 2
    serviceAccount:
      annotations: {}
    env:
      DB_NAME: identity_db
    resources:
      requests:
        cpu: 150m
        memory: 192Mi
      limits:
        cpu: 750m
        memory: 384Mi
    probes:
      readiness:
        path: /health
        initialDelaySeconds: 10
      liveness:
        path: /health
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
  event-service:
    repository: blacktickets-event-service
    tag: v0.0.1
    port: 4002
    replicas: 2
    serviceAccount:
      roleName: event-service-irsa
      annotations: {}
    env:
      DB_NAME: event_db
    resources:
      requests:
        cpu: 150m
        memory: 192Mi
      limits:
        cpu: 750m
        memory: 384Mi
    probes:
      readiness:
        path: /health
        initialDelaySeconds: 10
      liveness:
        path: /health
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
  booking-service:
    repository: blacktickets-booking-service
    tag: v0.0.1
    port: 4003
    replicas: 2
    serviceAccount:
      roleName: booking-service-irsa
      annotations: {}
    env:
      DB_NAME: booking_db
    resources:
      requests:
        cpu: 150m
        memory: 192Mi
      limits:
        cpu: 750m
        memory: 384Mi
    probes:
      readiness:
        path: /health
        initialDelaySeconds: 10
      liveness:
        path: /health
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
  chatbot-service:
    repository: blacktickets-chatbot-service
    tag: v0.0.1
    port: 4004
    replicas: 2
    serviceAccount:
      roleName: chatbot-service-irsa
      annotations: {}
    env: {}
    resources:
      requests:
        cpu: 150m
        memory: 192Mi
      limits:
        cpu: 750m
        memory: 384Mi
    probes:
      readiness:
        path: /health
        initialDelaySeconds: 10
      liveness:
        path: /health
        initialDelaySeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: false
