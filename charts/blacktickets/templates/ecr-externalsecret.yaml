{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: ecr-cred
  namespace: {{ .Values.namespace | quote }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreName | quote }}
    kind: {{ .Values.externalSecrets.secretStoreKind | quote }}
  target:
    name: ecr-cred
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: /blacktickets/ecr/cred
{{- end }}
