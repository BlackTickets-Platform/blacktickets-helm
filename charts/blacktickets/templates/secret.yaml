{{- if and .Values.secrets.create (not .Values.externalSecrets.enabled) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.name | quote }}
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "blacktickets.labels" . | nindent 4 }}
type: Opaque
stringData: {}
{{- end }}
