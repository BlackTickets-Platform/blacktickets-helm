{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: blacktickets
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "blacktickets.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: blacktickets
      sectionName: http
  {{- with .Values.gateway.hostname }}
  hostnames:
    - {{ . | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /auth
      backendRefs:
        - name: identity-service
          port: {{ (index .Values.services "identity-service").port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/users
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /users
      backendRefs:
        - name: identity-service
          port: {{ (index .Values.services "identity-service").port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/events
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /events
      backendRefs:
        - name: event-service
          port: {{ (index .Values.services "event-service").port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/bookings
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /bookings
      backendRefs:
        - name: booking-service
          port: {{ (index .Values.services "booking-service").port }}
    - matches:
        - path:
            type: PathPrefix
            value: /api/chatbot
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /chatbot
      backendRefs:
        - name: chatbot-service
          port: {{ (index .Values.services "chatbot-service").port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: {{ (index .Values.services "frontend").port }}
{{- end }}
