{{- if .Values.gateway.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: blacktickets
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "blacktickets.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: blacktickets
      sectionName: http
  {{- with .Values.gateway.hostname }}
  hostnames:
    - {{ . | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: {{ (index .Values.services "frontend").port }}
{{- end }}
