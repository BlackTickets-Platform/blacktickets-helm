{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: blacktickets
  namespace: {{ .Values.namespace | quote }}
  labels:
    {{- include "blacktickets.labels" . | nindent 4 }}
  annotations:
    alb.ingress.kubernetes.io/scheme: {{ .Values.ingress.scheme | quote }}
    alb.ingress.kubernetes.io/target-type: {{ .Values.ingress.targetType | quote }}
    alb.ingress.kubernetes.io/listen-ports: {{ .Values.ingress.listenPorts | quote }}
    alb.ingress.kubernetes.io/healthcheck-path: {{ .Values.ingress.healthcheckPath | quote }}
    alb.ingress.kubernetes.io/transforms.identity-service: '[{"type":"url-rewrite","urlRewriteConfig":{"rewrites":[{"regex":"^/api/(auth|users)(.*)$","replace":"/$1$2"}]}}]'
    alb.ingress.kubernetes.io/transforms.event-service: '[{"type":"url-rewrite","urlRewriteConfig":{"rewrites":[{"regex":"^/api/events(.*)$","replace":"/events$1"}]}}]'
    alb.ingress.kubernetes.io/transforms.booking-service: '[{"type":"url-rewrite","urlRewriteConfig":{"rewrites":[{"regex":"^/api/bookings(.*)$","replace":"/bookings$1"}]}}]'
    alb.ingress.kubernetes.io/transforms.chatbot-service: '[{"type":"url-rewrite","urlRewriteConfig":{"rewrites":[{"regex":"^/api/chatbot(.*)$","replace":"/chatbot$1"}]}}]'
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: {{ (index .Values.services "identity-service").port }}
          - path: /api/users
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: {{ (index .Values.services "identity-service").port }}
          - path: /api/events
            pathType: Prefix
            backend:
              service:
                name: event-service
                port:
                  number: {{ (index .Values.services "event-service").port }}
          - path: /api/bookings
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: {{ (index .Values.services "booking-service").port }}
          - path: /api/chatbot
            pathType: Prefix
            backend:
              service:
                name: chatbot-service
                port:
                  number: {{ (index .Values.services "chatbot-service").port }}
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: {{ (index .Values.services "identity-service").port }}
          - path: /users
            pathType: Prefix
            backend:
              service:
                name: identity-service
                port:
                  number: {{ (index .Values.services "identity-service").port }}
          - path: /events
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ (index .Values.services "frontend").port }}
          - path: /bookings
            pathType: Prefix
            backend:
              service:
                name: booking-service
                port:
                  number: {{ (index .Values.services "booking-service").port }}
          - path: /chatbot
            pathType: Prefix
            backend:
              service:
                name: chatbot-service
                port:
                  number: {{ (index .Values.services "chatbot-service").port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: {{ (index .Values.services "frontend").port }}
{{- end }}
