{{- if .Values.gateway.enabled }}
apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: blacktickets
  namespace: argocd
  labels:
    {{- include "blacktickets.labels" . | nindent 4 }}
spec:
  defaultConfiguration:
    targetType: ip
---
apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: blacktickets
  namespace: monitoring
  labels:
    {{- include "blacktickets.labels" . | nindent 4 }}
spec:
  defaultConfiguration:
    targetType: ip
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: argocd-server
  namespace: argocd
  labels:
    {{- include "blacktickets.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: blacktickets
      namespace: {{ .Values.namespace | quote }}
      sectionName: http
    - name: blacktickets
      namespace: {{ .Values.namespace | quote }}
      sectionName: https
  hostnames:
    - "argocd.ananthapps.site"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: argocd-server
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
  labels:
    {{- include "blacktickets.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: blacktickets
      namespace: {{ .Values.namespace | quote }}
      sectionName: http
    - name: blacktickets
      namespace: {{ .Values.namespace | quote }}
      sectionName: https
  hostnames:
    - "grafana.ananthapps.site"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: prometheus-stack-grafana
          port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: monitoring
  labels:
    {{- include "blacktickets.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: blacktickets
      namespace: {{ .Values.namespace | quote }}
      sectionName: http
    - name: blacktickets
      namespace: {{ .Values.namespace | quote }}
      sectionName: https
  hostnames:
    - "prometheus.ananthapps.site"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: prometheus-stack-kube-prom-prometheus
          port: 9090
{{- end }}
